<div class="container mt-4" style="max-width: 450px;">
  <h2>Update Skill</h2>

  <div class="form-group mb-3">
    <label>Name</label>
    <input class="form-control" [(ngModel)]="name" />
  </div>

  <div class="form-group mb-3">
    <label>Category</label>
    <input class="form-control" [(ngModel)]="category" />
  </div>

  <button class="btn btn-success w-100" (click)="updateSkill()">
    Save
  </button>
</div>
