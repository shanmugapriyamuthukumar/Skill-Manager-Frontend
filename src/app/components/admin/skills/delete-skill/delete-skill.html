<div class="page">

  <div class="card">

    <h2>Delete Skill</h2>
    <p class="sub-text">Remove a skill using its ID</p>

    <!-- INPUT -->
    <label>Skill ID</label>
    <input 
      type="number" 
      placeholder="Enter skill ID"
      [(ngModel)]="skillId">

    <!-- BUTTON -->
    <button class="danger-btn" (click)="deleteSkill()">
      Delete Skill
    </button>

  </div>

</div>
