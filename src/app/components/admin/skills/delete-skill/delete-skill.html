<div class="container mt-4" style="max-width: 400px;">
  <h2>Delete Skill</h2>

  <div class="form-group mb-3">
    <label>Enter Skill ID</label>
    <input type="number" class="form-control" [(ngModel)]="skillId" placeholder="Skill ID">
  </div>

  <button class="btn btn-danger w-100" (click)="deleteSkill()">
    Delete Skill
  </button>
</div>
