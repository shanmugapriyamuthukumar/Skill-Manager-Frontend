<div class="page">

  <div class="card">

    <h2>Skill List</h2>
    <p class="sub-text">All available skills</p>

    <!-- TABLE -->
    <table class="skill-table">

      <thead>
        <tr>
          <th>ID</th>
          <th>Category</th>
          <th>Name</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let skill of skills">
          <td>{{ skill.id }}</td>
          <td>{{ skill.category || '-' }}</td>
          <td>{{ skill.name }}</td>
        </tr>

        <!-- EMPTY -->
        <tr *ngIf="skills.length === 0">
          <td colspan="3" class="empty">No skills found</td>
        </tr>

      </tbody>

    </table>

  </div>

</div>
