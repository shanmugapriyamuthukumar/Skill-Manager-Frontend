<div class="container mt-4" style="max-width: 450px;">
  <h2 class="mb-3">Add Skill</h2>

  <div class="form-group mb-3">
    <label>Skill Name</label>
    <input 
      type="text" 
      class="form-control"
      placeholder="Enter skill name"
      [(ngModel)]="name">
  </div>

  <div class="form-group mb-3">
    <label>Category (optional)</label>
    <input 
      type="text" 
      class="form-control"
      placeholder="E.g., Programming, Database..."
      [(ngModel)]="category">
  </div>

  <button class="btn btn-primary w-100" (click)="submitSkill()">
    Add Skill
  </button>
</div>
