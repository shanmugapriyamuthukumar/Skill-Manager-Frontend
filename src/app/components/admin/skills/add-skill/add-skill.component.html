<div class="page">

  <div class="card">

    <h2>Add Skill</h2>
    <p class="sub-text">Add a new skill to the system</p>

    <!-- SKILL NAME -->
    <label>Skill Name</label>
    <input 
      type="text" 
      placeholder="Enter skill name"
      [(ngModel)]="name">

    <!-- CATEGORY -->
    <label>Category (optional)</label>
    <input 
      type="text" 
      placeholder="E.g., Programming, Database..."
      [(ngModel)]="category">

    <!-- BUTTON -->
    <button class="primary-btn" (click)="submitSkill()">
      Add Skill
    </button>

  </div>

</div>
