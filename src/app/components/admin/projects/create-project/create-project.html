<h2>Create Project</h2>
<form [formGroup]="projectForm" (ngSubmit)="createProject()">
  <label for="projectName">Project Name</label>
  <input id="projectName" formControlName="projectName" required />

  <h3>Required Skills</h3>
  <div formArrayName="requiredSkills">
    <div *ngFor="let skill of requiredSkills.controls; let i = index" [formGroupName]="i" class="skill-row">
      <select formControlName="skillId" required>
        <option *ngFor="let s of availableSkills" [value]="s.id">{{ s.name }}</option>
      </select>

      <input type="number"
             formControlName="requiredLevel"
             min="1" max="5"
             placeholder="Level (1–5)"
             required />

      <button type="button" (click)="removeSkill(i)" *ngIf="requiredSkills.length > 1">Remove</button>
    </div>
  </div>

  <button type="button" (click)="addSkill()">+ Add Skill</button>
  <button type="submit" [disabled]="projectForm.invalid">Create Project</button>
</form>
