<div class="container">
  <h2>Projects</h2>

  <table border="1" width="40%">
    <thead>
      <tr>
        <th>ID</th>
        <th>Project Name</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let p of projects">
        <td>{{ p.id }}</td>
        <td>{{ p.projectName }}</td>
      </tr>
    </tbody>
  </table>
</div>
