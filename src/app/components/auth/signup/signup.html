<div class="signup-container">
  <h2 class="signup-title">Employee Sign Up</h2>

  <form [formGroup]="signupForm" (ngSubmit)="signup()" class="signup-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" placeholder="Enter your username" required />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Enter your email" required />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Create a password" required />
    </div>

    <button type="submit" class="btn btn-primary">Sign Up</button>
  </form>

  <p class="login-redirect">
    Already registered?
    <a routerLink="/" class="btn-link">Log in here</a>
  </p>
</div>
