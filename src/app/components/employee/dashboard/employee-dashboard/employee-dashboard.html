<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2 class="logo">Skill Manager</h2>

    <div class="menu">
      <p class="menu-title">Skills</p>
      <a routerLink="/employee/skills" class="menu-title">Skill Check</a>
    </div>

    <div class="logout">
      <a routerLink="/" class="menu-title">Logout</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="header">
      <h1>My Skills</h1>
      <p>Welcome, {{ employeeName }} <br> Emp No: {{ employeeId }}</p>
    </div>

    <div class="main-content">

      <!-- Add Skill Form -->
<div class="add-skill-form">
  <!-- Dropdown showing skill name + category -->
  <select [(ngModel)]="selectedSkillId">
    <option value="0">-- Select Skill --</option>
    <option *ngFor="let skill of skills" [value]="skill.id">
      {{ skill.name }} ({{ skill.category }})
    </option>
  </select>

  <input type="number" [(ngModel)]="newProficiency" placeholder="Proficiency Level" min="1" max="5">
  <input type="number" [(ngModel)]="newExperience" placeholder="Experience (Years)" min="0">
  <button (click)="addSkill()">Add Skill</button>
</div>


      <!-- Skills Table -->
      <table class="skill-table">
        <thead>
          <tr>
            <th>Skill</th>
            <th>Category</th>
            <th>Proficiency</th>
            <th>Experience (Years)</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let skill of employeeSkills">
            <td>{{ skill.skillName }}</td>
            <td>{{ skill.category }}</td>
            <td>
              <input type="number" [(ngModel)]="skill.proficiencyLevel" min="1" max="5">
            </td>
            <td>
              <input type="number" [(ngModel)]="skill.yearsOfExperience" min="0">
            </td>
            <td>
              <button class="update-btn" (click)="updateSkill(skill)">Update</button>
              <button class="delete-btn" (click)="deleteSkill(skill.id)">Delete</button>
            </td>
          </tr>
          <tr *ngIf="employeeSkills.length === 0">
            <td colspan="5" class="empty">No skills available</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
