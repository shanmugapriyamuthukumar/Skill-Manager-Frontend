<h2>Add Employee Skill</h2>
<form [formGroup]="addSkillForm" (ngSubmit)="addSkill()">
  <label for="skillId">Select Skill</label>
  <select id="skillId" formControlName="skillId" required>
    <option *ngFor="let s of availableSkills" [value]="s.id">
      {{ s.name }} ({{ s.category }})
    </option>
  </select>

  <label for="proficiencyLevel">Proficiency Level (1–5)</label>
  <input type="number" id="proficiencyLevel" formControlName="proficiencyLevel" min="1" max="5" required />

  <label for="yearsOfExperience">Years of Experience</label>
  <input type="number" id="yearsOfExperience" formControlName="yearsOfExperience" min="0" required />

  <button type="submit" [disabled]="addSkillForm.invalid">Add Skill</button>
</form>
