<div class="add-skill">
  <h2>Add New Skill</h2>
  <form [formGroup]="addSkillForm" (ngSubmit)="addSkill()">
    <div class="form-group">
      <label for="skillId">Skill</label>
      <select id="skillId" formControlName="skillId">
        <option *ngFor="let s of availableSkills" [value]="s.id">{{ s.name }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="proficiencyLevel">Proficiency Level (1–5)</label>
      <input type="number" id="proficiencyLevel" formControlName="proficiencyLevel" min="1" max="5" />
    </div>

    <div class="form-group">
      <label for="yearsOfExperience">Years of Experience</label>
      <input type="number" id="yearsOfExperience" formControlName="yearsOfExperience" min="0" />
    </div>

    <button type="submit" class="btn-add" [disabled]="addSkillForm.invalid">Add Skill</button>
  </form>
</div>
