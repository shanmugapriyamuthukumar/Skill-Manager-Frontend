<h2>Update Employee Skill</h2>
<form [formGroup]="updateSkillForm" (ngSubmit)="updateSkill()">
  <label for="selectedSkillId">Select Skill</label>
  <select id="selectedSkillId"
          formControlName="selectedSkillId"
          (change)="onSkillChange($event)"
          required>
    <option *ngFor="let s of mySkills" [value]="s.id">
      {{ s.skillName }} ({{ s.category }})
    </option>
  </select>

  <label for="proficiencyLevel">Proficiency Level (1–5)</label>
  <input type="number"
         id="proficiencyLevel"
         formControlName="proficiencyLevel"
         min="1" max="5"
         required />

  <label for="yearsOfExperience">Years of Experience</label>
  <input type="number"
         id="yearsOfExperience"
         formControlName="yearsOfExperience"
         min="0"
         required />

  <button type="submit" [disabled]="updateSkillForm.invalid">Update Skill</button>
</form>
